; ╔══════════════════════════════════════════════════════╗
; ║  PlatformIO — ESP32 WiFiMulti + Parallel Sensor      ║
; ╚══════════════════════════════════════════════════════╝
[platformio]
;default_envs = esp32dev
default_envs = esp32-c3-devkitm-1

; ── Shared settings inherited by all envs ─────────────────────────────────────
[env]
framework   = arduino
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder   ; decode panic stack traces automatically
    time                      ; prefix each log line with a timestamp

build_flags =
    -std=gnu++17      ; enables inline constexpr, structured bindings, etc.
    -DCORE_DEBUG_LEVEL=5      ; ESP_LOGx output: 0=none … 5=verbose
    -DCONFIG_ARDUHAL_LOG_COLORS=1

build_unflags =
    -std=gnu++11              ; remove the Arduino framework default

lib_deps =
    bitbank2/OneBitDisplay@^2.3.2
    ; ── InfluxDB v2 client ────────────────────────────────────────────────
    tobiasschuerg/ESP8266 Influxdb @ ^3.13.2   ; works on ESP32 too

    ; ── Add your sensor library here, e.g.: ──────────────────────────────
    ; adafruit/DHT sensor library @ ^1.4.6
    ; adafruit/Adafruit BME280 Library @ ^2.2.4
    ; adafruit/Adafruit SHT4x Library @ ^1.0.3

; ── Generic ESP32 DevKit (most common board) ──────────────────────────────────
;[env:esp32dev]
;platform = espressif32
;board    = esp32dev

; ── ESP32 C3 OneBitDisplay
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1

; ── WROOM-32 / ESP32-S3 variants — uncomment as needed ───────────────────────
; [env:esp32s3]
; platform = espressif32
; board    = esp32-s3-devkitc-1

; [env:esp32c3]
; platform = espressif32
; board    = esp32-c3-devkitm-1
